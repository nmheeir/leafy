name: leafy
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  smooth_page_indicator: ^1.2.1
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1
  cached_network_image: ^3.4.1
  infinite_scroll_pagination: ^5.1.1
  url_launcher: ^6.3.2
  easy_localization: ^3.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  commitlint_cli: ^0.8.1
  husky: ^0.1.7
  melos: ^7.3.0

melos:
  useRootAsPackage: true
  scripts:
    elgen:
      run: flutter pub run easy_localization:generate -S assets/translations -f keys -o locale_keys.g.dart

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

