name: leafy
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  smooth_page_indicator: ^1.2.1
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1
  cached_network_image: ^3.4.1
  infinite_scroll_pagination: ^5.1.1
  url_launcher: ^6.3.2
  easy_localization: ^3.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  equatable: ^2.0.7
  diacritic: ^0.1.6
  shared_preferences: ^2.5.3
  blurhash: ^1.2.0
  blurhash_dart: ^1.2.1
  image: ^4.5.4
  rxdart: ^0.28.0
  http: ^1.6.0
  dropdown_button2: ^2.3.9
  material_symbols_icons: ^4.2874.0
  flutter_speed_dial: ^7.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.20.2
  modal_bottom_sheet: ^3.0.0
  flutter_typeahead: ^5.2.0
  font_awesome_flutter: ^10.12.0
  dotted_border: ^3.1.0
  settings_ui: ^2.0.2
  package_info_plus: ^9.0.0
  flex_color_picker: ^3.8.0
  fl_chart: ^1.1.1
  collection: ^1.19.1
  loading_animation_widget: ^1.3.0
  image_cropper: ^11.0.0
  image_picker: ^1.2.1
  dynamic_color: ^1.8.1
  mobile_scanner: ^7.1.3
  connectivity_plus: ^7.0.0
  flutter_cache_manager: ^3.4.1
  dio: ^5.9.0
  flutter_epub_viewer: ^1.2.6
  logger: ^2.6.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  crypto: ^3.0.7
  injectable: ^2.7.1+2
  get_it: ^9.2.0
  fpdart: ^1.2.0
  retrofit: ^4.9.1
  pretty_dio_logger: ^1.4.0
  stream_transform: ^2.1.1
  bloc_concurrency: ^0.3.0
  share_plus: ^12.0.1
  html: ^0.15.6
  flutter_widget_from_html: ^0.17.1
  scrollable_positioned_list: ^0.3.8
  uuid: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  commitlint_cli: ^0.8.1
  husky: ^0.1.7
  melos: ^7.3.0
  build_runner: ^2.10.4
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  injectable_generator: ^2.9.1
  retrofit_generator: 10.2.0

melos:
  useRootAsPackage: true
  scripts:
    elgen:
      run: flutter pub run easy_localization:generate -S assets/translations -f keys -o locale_keys.g.dart

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
